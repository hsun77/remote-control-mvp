<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remote Control MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>Remote Control MVP</h1>
          <p id="status">Ready</p>
        </div>
        <button id="disconnectBtn" class="ghost" disabled>Disconnect</button>
      </section>

      <section class="layout">
        <aside class="panel">
          <section class="device-card">
            <h2>This computer</h2>
            <div id="deviceId" class="device-id">RC-----</div>
            <button id="testInputBtn" class="ghost" type="button">Test input on this computer</button>
          </section>

          <section class="settings-card">
            <h2>Keyboard</h2>
            <label class="check-row">
              <input id="translateShortcuts" type="checkbox" checked />
              <span>Translate Cmd/Ctrl shortcuts between Mac and Windows</span>
            </label>
          </section>

          <label>
            Signaling URL
            <input id="serverUrl" value="ws://localhost:4141" spellcheck="false" />
          </label>

          <section class="network">
            <h2>Global relay</h2>
            <label>
              TURN URL
              <input id="turnUrl" placeholder="turn:your-public-server:3478" spellcheck="false" />
            </label>
            <div class="field-row">
              <label>
                User
                <input id="turnUser" autocomplete="off" spellcheck="false" />
              </label>
              <label>
                Password
                <input id="turnPassword" type="password" autocomplete="off" />
              </label>
            </div>
          </section>

          <div class="split">
            <section>
              <h2>Share this computer</h2>
              <div id="sources" class="sources"></div>
              <button id="shareBtn">Share this computer</button>
              <p class="hint">If macOS asks what to share, choose the entire screen, not a window.</p>
              <p class="hint">Room code is temporary. Device ID stays fixed on this computer.</p>
              <div id="roomCode" class="room-code">------</div>
            </section>

            <section>
              <h2>Control another computer</h2>
              <label>
                Room code
                <input id="joinCode" inputmode="numeric" maxlength="6" placeholder="123456" />
              </label>
              <button id="connectBtn">Connect</button>
            </section>
          </div>
        </aside>

        <section class="stage">
          <video id="remoteVideo" autoplay playsinline></video>
          <video id="localPreview" autoplay muted playsinline></video>
          <div id="emptyState" class="empty-state">No remote desktop connected</div>
        </section>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
